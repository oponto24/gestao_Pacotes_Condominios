# =====================================================================
# Docker Compose — Desenvolvimento local
# =====================================================================
# Sobe stack completo (postgres + redis + app + worker) com 1 comando.
# Carregado a partir da raiz do projeto:
#   docker compose -f infra/docker/docker-compose.yml --env-file .env.local up -d
#
# Story 1.2 — Fundação Técnica. Próximas stories vão somar:
#   - 1.3: aplicar migrations Prisma
#   - 1.5: variáveis Clerk
#   - 1.8: BullMQ jobs reais (worker deixa de ser placeholder)
#   - 8.4: equivalente .prod.yml com Caddy + secrets
# =====================================================================

name: gestao-pacotes-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestao_pacotes
      POSTGRES_USER: app
      POSTGRES_PASSWORD: dev_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d gestao_pacotes']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: development
    restart: unless-stopped
    command: npm run dev
    ports:
      - '3000:3000'
    env_file:
      - ../../.env.local
    volumes:
      # Bind do código para hot reload
      - ../..:/app
      # Volumes nomeados sobrescrevem bind para evitar conflito macOS↔linux
      # (binários compilados como sharp/esbuild são linux-x64 dentro do container)
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: development
    restart: unless-stopped
    command: npm run worker:dev
    env_file:
      - ../../.env.local
    volumes:
      - ../..:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  node_modules:
  next_cache:
