# =====================================================================
# Docker Compose PRODUÇÃO — VPS Ponto 24 (story 3.12)
# =====================================================================
# Uso na VPS:
#   cd /opt/gestao-pacotes
#   cp .env.prod.example .env.prod   # preenche secrets
#   docker compose -f infra/docker/docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Subindo primeira vez:
#   - Espera postgres healthy
#   - docker compose ... exec app npx prisma migrate deploy
#   - Acessa https://<DOMAIN>
# =====================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestao_pacotes
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-app} -d gestao_pacotes']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:5432/gestao_pacotes
      DATABASE_RUNTIME_URL: ${DATABASE_RUNTIME_URL:-postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:5432/gestao_pacotes}
      REDIS_URL: redis://redis:6379
      # Provider de extração de etiqueta (default: gemini, fallback: anthropic)
      EXTRACT_LABEL_PROVIDER: ${EXTRACT_LABEL_PROVIDER:-gemini}
      EXTRACT_LABEL_FALLBACK: ${EXTRACT_LABEL_FALLBACK:-anthropic}
      EXTRACT_LABEL_MAX_RETRIES: ${EXTRACT_LABEL_MAX_RETRIES:-3}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:?GOOGLE_API_KEY obrigatório (Gemini default)}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY obrigatório (fallback)}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      ANTHROPIC_PROMPT_CACHE_ENABLED: 'true'
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?CLERK_SECRET_KEY obrigatório}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?CLERK key obrigatório}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      # Meta WhatsApp Cloud API (Epic 4 — story 4.1, 4.4)
      META_APP_ID: ${META_APP_ID:-placeholder}
      META_APP_SECRET: ${META_APP_SECRET:-placeholder}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID:-placeholder}
      META_WABA_ID: ${META_WABA_ID:-placeholder}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-placeholder}
      META_API_VERSION: ${META_API_VERSION:-v25.0}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-placeholder}
      META_DISABLED: ${META_DISABLED:-false}
      APP_URL: ${APP_URL:-https://${DOMAIN}}
      STORAGE_DRIVER: local
      STORAGE_LOCAL_ROOT: /app/storage
      LOG_LEVEL: info
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', "wget --spider -q http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - web

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:5432/gestao_pacotes
      REDIS_URL: redis://redis:6379
      EXTRACT_LABEL_PROVIDER: ${EXTRACT_LABEL_PROVIDER:-gemini}
      EXTRACT_LABEL_FALLBACK: ${EXTRACT_LABEL_FALLBACK:-anthropic}
      EXTRACT_LABEL_MAX_RETRIES: ${EXTRACT_LABEL_MAX_RETRIES:-3}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      ANTHROPIC_PROMPT_CACHE_ENABLED: 'true'
      STORAGE_DRIVER: local
      STORAGE_LOCAL_ROOT: /app/storage
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      APP_URL: ${APP_URL:-https://${DOMAIN}}
      # Meta WhatsApp — worker precisa pra sendTemplate (story 4.3)
      META_APP_ID: ${META_APP_ID:-placeholder}
      META_APP_SECRET: ${META_APP_SECRET:-placeholder}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID:-placeholder}
      META_WABA_ID: ${META_WABA_ID:-placeholder}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-placeholder}
      META_API_VERSION: ${META_API_VERSION:-v25.0}
      META_DISABLED: ${META_DISABLED:-false}
      LOG_LEVEL: info
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN obrigatório}
    depends_on:
      - app
    networks:
      - web

  certbot:
    image: certbot/certbot:v2.11.0
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renovação automática a cada 12h
    entrypoint: '/bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;"'

volumes:
  postgres_data:
  redis_data:
  app_storage:
  certbot_certs:
  certbot_www:

networks:
  internal:
  web:
