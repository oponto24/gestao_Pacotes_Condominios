reviewer_notes: |
  Implementação madura. O gerenciamento do "dual DATABASE_URL" (host
  usa localhost, container usa nome do service via override em
  environment:) é o tipo de decisão arquitetural sutil que costuma quebrar
  projetos Prisma+Docker. Bem resolvido e documentado.

  Atenção pra 1.4: o arquivo `rls_policies.sql` está em
  `prisma/migrations/20260506200212_initial_schema/` mas Prisma NÃO vai
  aplicá-lo automaticamente (Prisma só processa `migration.sql`). Story 1.4
  precisará rodá-lo via `psql -f` ou similar. Documentar o método escolhido
  no story 1.4.
