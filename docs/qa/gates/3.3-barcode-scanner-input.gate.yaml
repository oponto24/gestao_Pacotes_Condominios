storyId: 3.3
storyTitle: Componente BarcodeScannerInput (html5-qrcode + fallback)
reviewedBy: '@qa (Quinn)'
reviewedAt: '2026-05-07'
verdict: PASS
score: 9/10

summary: |
  Componente reusável de scanner de código de barras (1D + QR). State
  machine via `useReducer` com 5 kinds (`closed`/`requesting`/`scanning`/
  `closing`/`error`). Cleanup imperativo do html5-qrcode + container DOM
  isolado de React.

  **Bug HIGH descoberto e resolvido durante smoke E2E:** `removeChild error`
  por conflito de DOM ownership entre React e html5-qrcode. Solução
  arquitetural (não workaround): div do scanner criado imperativamente
  via `document.createElement`, anexado ao container que React vê como
  vazio. html5-qrcode tem ownership total do video que insere; React não
  tenta `removeChild` de nós que não controla.

  **9 unit tests** (176→185), **smoke S1+S2+S6 PASS** em browser real
  (modal abre, QR do WhatsApp do user detectado e input preenchido,
  integração no playground), **S3-S5 cobertos por unit tests** (digitação
  manual, cleanup unmount, mock NotAllowedError).

  Score 9/10 reflete: -0.5 pelo bug HIGH descoberto pós-implementação
  (mas resolvido na mesma sessão), -0.5 pelos S3-S5 não testados em
  browser real (mitigados por unit tests com mocks robustos).

