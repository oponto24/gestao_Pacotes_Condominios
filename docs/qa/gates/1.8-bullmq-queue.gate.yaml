reviewer_notes: |
  Excelente story. A escolha de Opção B (`withTenant` callback) na 1.6
  pagou dividendo aqui — workers usam `withTenantContext` direto, pattern
  documentado, sem ambiguidade.

  3 gotchas conhecidos foram tratados:
  - REDIS_URL host vs container (mesma estratégia DATABASE_URL da 1.3)
  - Volume node_modules cacheado (rebuild com --build)
  - Vitest it.skipIf static-time (5ª ocorrência, padrão estabelecido)

  Decisão de map mutable (Record<string, AnyProcessor>) é o trade-off
  certo pra MVP. Discriminated union gigante seria over-engineering.

  Ponto a destacar: documentação `docs/runbooks/jobs.md` (~250 linhas)
  é referência completa — pattern, troubleshooting, debugging via Redis
  CLI, próximas stories. Investimento que paga toda vez que dev novo
  precisar adicionar job.

  CodeRabbit não foi executado (CLI WSL-only, ambiente macOS). Validação
  manual + reprodução E2E independente + suite integration foi suficiente.
