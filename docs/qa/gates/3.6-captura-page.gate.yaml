    category: requirements
    description: |
      Story incluiu redirect pra `/chegada/confirmar/{id}` que retorna 404
      até a story 3.8 ser implementada.
    recommendation: |
      Aceitável — documentado na story e no smoke. Próxima story (3.7)
      ou 3.8 fecha o loop.

