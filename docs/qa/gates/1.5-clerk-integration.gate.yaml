summary: |
  Story crítica de auth + webhook executada com qualidade alta. Marco do
  projeto: primeiro fluxo E2E REAL com serviço externo (Clerk Dashboard
  → tunnel cloudflared → app local → Postgres) confirmado pelo fundador.

  Implementação corretamente seguiu o padrão Clerk: HMAC svix obrigatório
  antes de processar payload, upsert preserva condominio_id/role em
  user.updated, user.deleted faz UPDATE ativo=false em vez de DELETE
  (preserva FKs em pacotes futuros).

  Descoberta crítica documentada: doc oficial passada pelo fundador
  recomendava `proxy.ts`, mas Clerk 7.3.1 ainda exige `src/middleware.ts`.
  Dex resolveu corretamente renomeando, e marcou como tech-debt para
  upgrade futuro. Excelente exemplo de pragmatismo.

issues:
  - severity: low
    category: observability
    description: |
      Handler usa `console.log/warn/error` direto em vez de logger
      estruturado (Pino vem na story 1.9). Logs ficam difíceis de filtrar/
      grep em produção.
    impact: |
      Aceitável até 1.9 chegar. Sem impacto em dev.
    recommendation: |
      Quando 1.9 trouxer Pino, refatorar handler pra usar `logger.info` /
      `logger.warn` com structured fields.
    blocking: false

  - severity: low
    category: edge-case
    description: |
      Type union de `ClerkWebhookEvent.type` inclui `string` solto:
      `'user.created' | 'user.updated' | 'user.deleted' | string`.
      Perde type safety (qualquer string passa).
    impact: |
      Defensivo — aceita futuros eventos Clerk sem quebrar (svix.send,
      session.created, etc). Trade-off intencional.
    recommendation: |
      Quando precisar processar mais eventos, restringir o union e
      remover `| string`. Não bloqueia.
    blocking: false

  - severity: low
    category: idempotency
    description: |
      Handler não mantém histórico de svix-ids processados. Se Clerk
      retentar mesmo evento (ex: timeout do nosso lado), upsert idempotente
      cobre, mas não há proteção explícita.
    impact: |
      Risco mínimo — `db.user.upsert` é naturalmente idempotente. Cenário
      patológico seria atacante reenviar webhook antigo (mas com mesmo
      svix-id e HMAC válido — dificil sem secret).
    recommendation: |
      Pós-MVP, considerar tabela `webhook_event_log(svix_id PK, processed_at)`
      pra rejeitar duplicatas explicitamente. Padrão de defense-in-depth.
    blocking: false

  - severity: medium
    category: security
    description: |
      Mesmas 2 vulns moderate em postcss (recorrente desde 1.1).
      Não introduzido por esta story.
    impact: |
      Build-time only.
    recommendation: |
      Já documentado nos gates anteriores.
    blocking: false

  - severity: low
    category: tech-debt
    description: |
      `src/middleware.ts` em vez do `proxy.ts` recomendado pela doc oficial
      mais recente passada pelo fundador. Razão: Clerk 7.3.1 ainda procura
      por `middleware.ts`.
    impact: |
      Funcional. Quando upgradar Clerk pra versão que suportar `proxy.ts`,
      basta renomear de volta.
    recommendation: |
      Story futura "Upgrade Clerk + migrate to proxy.ts" quando estável.
    blocking: false

