storyId: 1.2-docker-compose-dev
storyTitle: Setup Docker Compose dev (postgres + redis + app + worker)
reviewedBy: '@qa (Quinn)'
reviewedAt: 2026-05-06
verdict: PASS
score: 9.5/10
commit: cd7fe15
branch: feature/1.2-docker-compose-dev

summary: |
  Implementação sólida da fundação Docker. Multi-stage Dockerfile bem
  estruturado (4 stages, USER não-root em prod, tini em todos), compose com
  healthchecks corretos, volumes nomeados resolvendo o conflito macOS/linux
  de binários nativos, e runbook operacional completo em infra/README.md.

  Smoke test reproduzido independentemente: PostgreSQL 16.13, Redis 7.4.9,
  app respondendo HTTP 200 com HTML correto, worker process vivo, shutdown
  limpo. Único ponto de atenção é a observabilidade (logs vazios no docker
  compose logs) — funcionalidade ok, debug em dev fica prejudicado.

issues:
  - severity: medium
    category: observability
    description: |
      `docker compose logs app|worker` retorna vazio mesmo com containers
      rodando e respondendo corretamente. Causa provável: combinação de
      npm + tini em modo non-TTY bufferizando stdout do processo Node.
    impact: |
      Funcionalidade NÃO afetada (validado via curl + ps aux + healthchecks).
      Apenas debug em dev fica prejudicado — devs precisarão usar
      `docker exec` para ver o que está acontecendo dentro do container.
    recommendation: |
      Investigar e corrigir em story futura. Opções:
      1. Adicionar `tty: true, stdin_open: true` aos services app+worker
      2. Trocar `npm run dev` por chamada direta `node node_modules/.bin/next dev`
      3. Investigar PIPE buffering do tini ou variável NODE_NO_WARNINGS
    blocking: false

  - severity: low
    category: config
    description: |
      Stage `production` do Dockerfile espera arquivos em `/app/.next/standalone/`
      mas `next.config.ts` ainda não tem `output: 'standalone'` configurado.
    impact: |
      Build do stage production falharia hoje. Não bloqueia esta story
      porque production só será exercitado em story 8.4.
    recommendation: |
      Story 8.4 deve, como pré-requisito, adicionar `output: 'standalone'`
      ao next.config.ts. Já documentado no Dev Notes da story 1.2.
    blocking: false

  - severity: low
    category: image-size
    description: |
      Stage `production` copia `--from=builder` que tem todas as devDependencies
      instaladas. Sem `npm prune --production` explícito, imagem pode ficar maior
      que necessário.
    impact: |
      `output: 'standalone'` do Next.js já gera bundle minificado, mitigando.
      Imagem final será aceitável, mas otimizável.
    recommendation: |
      Em story 8.4, considerar adicionar stage intermediário com `npm ci --omit=dev`
      antes do production, ou `npm prune --production` no builder.
    blocking: false

