reviewer_notes: |
  Excelente qualidade de implementação. A documentação (infra/README.md e
  Dev Notes) é referência pra próximas stories de infra — runbook
  operacional com troubleshooting raramente é tão completo no MVP.

  CodeRabbit não foi executado neste review (CLI WSL-only, ambiente macOS).
  Validação manual + reprodução independente do smoke test foi suficiente
  para esta story de infra.

  Atenção pra story 1.3 (Prisma): o tsconfig.json hoje exclui `prisma/**/*`
  (decisão temporária da story 1.1). Quando 1.3 instalar @prisma/client e
  rodar `prisma generate`, essa exclusão precisa ser revisada — provavelmente
  excluir só `prisma/seed.ts` se ele não estiver sendo importado pela app.
