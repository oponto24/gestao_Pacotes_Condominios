summary: |
  Story crítica de segurança executada com profundidade adequada. Dex
  encontrou e resolveu 3 problemas reais durante a execução que NÃO
  estavam previstos no schema da Dara (sintaxe GRANT CONNECT, FORCE RLS
  para owner, SUPERUSER bypassa RLS). A descoberta da role separada
  `app_runtime` é a parte mais valiosa — sem ela, RLS seria teatro de
  segurança em produção.

  Validei independentemente como cada role: `app_runtime` sem context
  retorna 0, INSERT cross-tenant falha com erro RLS, `webhook_worker`
  bloqueado em `condominio`, permitido em `morador`. Suite Vitest com
  6 cenários (positivos + negativos) é referência pra próximas stories
  de segurança.

issues:
  - severity: medium
    category: security
    description: |
      `apply-rls.sh` passa as senhas como argumento `-c "ALTER ROLE ... PASSWORD '<senha>'"`
      pro psql. Em sistemas multi-usuário, `ps aux` durante a execução
      pode expor as senhas via argumentos de processo (~milissegundos de janela).
    impact: |
      Risk baixo no dev local (single-user macOS). Em produção (story 8.4)
      essa estratégia precisa mudar — Docker secrets ou stdin pipe.
    recommendation: |
      Para a story 8.4 (deploy VPS), usar variante com stdin:
        echo "ALTER ROLE x WITH PASSWORD '$pwd'" | psql -U app -d gestao_pacotes
      Mais seguro porque psql lê do stdin, sem expor em ps aux.
    blocking: false

  - severity: medium
    category: error-handling
    description: |
      `apply-rls.sh` usa `> /dev/null 2>&1` no comando que seta as senhas.
      Se algo falhar (ex: role não existe ainda, conexão dropada),
      o script segue silenciosamente como se tivesse sucesso.
    impact: |
      Pode mascarar falhas em senha não setada → app conecta com placeholder
      → falha em runtime sem clareza da causa raiz.
    recommendation: |
      Trocar `> /dev/null 2>&1` por `2>&1 | grep -v "ALTER ROLE" || true`
      ou capturar stderr separadamente. Validar exit code explicitamente.
    blocking: false

  - severity: low
    category: design
    description: |
      `app_runtime` tem `GRANT SELECT,INSERT,UPDATE,DELETE ON ALL TABLES`
      que inclui tabelas globais (`condominio`, `user`, `audit_log`, `whatsapp_number`).
      RLS NÃO está habilitado nessas tabelas (intencional — são acessadas
      por super-admin). Logo `app_runtime` pode tecnicamente acessá-las.
    impact: |
      Defesa em profundidade pra tabelas globais é via middleware aplicacional
      (story 1.6). RLS deliberadamente não cobre essas. Não é vazamento — é
      o design — mas vale documentar pra evitar surpresa em refactors futuros.
    recommendation: |
      Adicionar comentário no SCHEMA.md §11 deixando explícito que `app_runtime`
      tem grants amplos em tabelas globais por design (controle aplicacional).
      Quando middleware estiver pronto (1.6), validar que tabelas globais só
      são acessadas via super-admin via testes de role.
    blocking: false

  - severity: medium
    category: security
    description: |
      Mesmas 2 vulns moderate transitivas em `postcss` (via Next.js).
      Recorrente desde story 1.1.
    impact: |
      Build-time only, sem exposição runtime. Risco baixo.
    recommendation: |
      Já documentado nos gates anteriores. Aguardar deduplicação Next.js.
    blocking: false

