reviewer_notes: |
  Esta é a primeira story onde o trabalho dele @dev passou MUITO além do
  spec. Os 3 fixes (GRANT sintaxe, FORCE RLS, role app_runtime) são
  descobertas que NÃO estavam no schema da Dara — Dex teve que entender
  Postgres internals pra resolver. Documentação do "por quê" está em Dev
  Notes, não em comentários no código (correto — código deve descrever
  o "como", não a história).

  Atenção pra próximas stories:
  - Story 1.5 (Clerk) deve usar `db` de `src/lib/db.ts` (já configurado
    pra DATABASE_RUNTIME_URL) — RLS vai filtrar queries automaticamente
    quando middleware de tenant context (story 1.6) for criado
  - Story 1.6 deve adicionar testes de middleware tenant também integration
  - Story 8.4 (deploy VPS) precisa migrar senhas pra Docker secrets

  CodeRabbit não foi executado (CLI WSL-only, ambiente macOS). Validação
  manual + reprodução independente do smoke test foi suficiente.
