    1. Tornar clerk_id placeholder único por email (sha256 hash, 16 chars)
    2. Adicionar test cobrindo cenário "2 SUPER_ADMIN_EMAIL diferentes"
    3. Re-rodar quality gates (lint/typecheck/test)
    4. Commit como "fix(seed): clerk_id placeholder único por email (QA fix 1.10)"
    5. Notificar @qa para re-review
