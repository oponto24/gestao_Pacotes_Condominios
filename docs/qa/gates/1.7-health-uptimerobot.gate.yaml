summary: |
  Story de observabilidade executada com qualidade alta. Endpoint /api/health
  agregado funciona em 3 estados (ok/degraded/down), retorna 503 em falha
  parcial (UptimeRobot interpreta corretamente como DOWN).

  Failure scenario reproduzido independentemente: ao pausar Redis com
  `docker compose pause redis`, endpoint reportou `status: degraded`,
  `redis.status: down, error: "timeout, latency_ms: 3006"` em HTTP 503
  enquanto `db.status: ok` continuou reportado corretamente. Granularidade
  de check funcionando.

  Categorização de erro (`categorizeError`) NÃO vaza connection string —
  apenas categoria pública (timeout, connection_refused, dns_error,
  auth_failed). Defesa adequada em endpoint público.

  ioredis instalado com config correta pra BullMQ (story 1.8) — preparação
  antecipada que evita refatoração futura.

issues:
  - severity: low
    category: code-style
    description: |
      Endpoints usam `next/server` NextResponse. Em Next.js 15+, `Response`
      nativo do Web API funciona igualmente e remove dependência implícita
      do framework.
    impact: |
      Funcional. Padrão amplamente usado em Next App Router.
    recommendation: |
      Não mudar agora — consistência com webhook/me endpoints existentes
      é mais importante que minimizar import.
    blocking: false

  - severity: low
    category: composability
    description: |
      Timeout de 3s no `withTimeout` é independente de timeouts internos
      do Prisma client (poderia ter `connectionTimeout` no datasource).
      Em cenário patológico, dois timeouts encadeados podem confundir
      debug.
    impact: |
      Marginal. Em prática, withTimeout cobre a maioria dos casos.
    recommendation: |
      Documentar em comentário que health checks têm timeout próprio
      independente das libs subjacentes. Pós-MVP considerar ajustar
      Prisma `connectionLimit` e `pool_timeout`.
    blocking: false

  - severity: low
    category: monitoring
    description: |
      Endpoints `/api/health` permitem cache HTTP por padrão. UptimeRobot
      não cachea (sempre faz request fresca), mas proxy/CDN intermediário
      poderia.
    impact: |
      Em produção, Caddy não cacheia /api/* por default. Risco zero
      pra arquitetura atual.
    recommendation: |
      Quando configurar Caddy (story 8.4), garantir `Cache-Control: no-store`
      em /api/health* via header ou Caddyfile.
    blocking: false

  - severity: medium
    category: security
    description: |
      Mesmas 2 vulns moderate em postcss (recorrente desde 1.1).
    impact: build-time only.
    recommendation: já documentado.
    blocking: false

