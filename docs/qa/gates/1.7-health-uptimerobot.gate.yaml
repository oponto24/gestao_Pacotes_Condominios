reviewer_notes: |
  Excelente story. O failure scenario test (pause/unpause Redis) foi a
  validação mais valiosa — provou que monitor externo vai detectar
  degradação parcial, não apenas DOWN total.

  Decisão de retornar 503 pra `degraded` (não 200 com flag) é correta —
  UptimeRobot interpreta 5xx como DOWN, então alerta é disparado mesmo
  quando só 1 componente caiu. Granularidade no payload permite
  distinguir "qual" caiu via dashboard.

  Padrões reusáveis estabelecidos:
  - `withTimeout` → vai ser reutilizado em checks Anthropic (3.5),
    Meta (4.4), etc.
  - `categorizeError` → mesmo padrão pra outros endpoints públicos
    (webhooks, etc.)
  - `aggregateStatus` 3-state → expansível pra adicionar checks
    de Anthropic, Meta API quando essas integrações chegarem

  ioredis + BullMQ-ready foi excelente foresight da Dex. Evita
  refatoração na 1.8.

  CodeRabbit não foi executado (CLI WSL-only, ambiente macOS). Validação
  manual + reprodução de failure + suite integration foi mais que
  suficiente pra story de severidade média.
