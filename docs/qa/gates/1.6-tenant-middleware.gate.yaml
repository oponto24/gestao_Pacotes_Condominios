reviewer_notes: |
  Excelente execução. A escolha da Opção B sobre $extends foi pragmática
  e bem documentada. As 9 decisões em Dev Notes são referência pra
  futuros middleware/integration work.

  O detalhe de "super_admin precisa LIMPAR current_condominio (e vice-versa)"
  é o tipo de bug sutil que só aparece em produção sob carga (pool de
  conexões reusa conexão entre requests). Bem identificado e tratado.

  Para próximas stories:
  - Story 1.7 deve manter padrão de smoke endpoint permanente
  - Story 1.8 (BullMQ) precisa decidir como worker lida com tenant context
    — workers não tem auth context Clerk. Provavelmente passa
    `condominioId` no payload do job e usa `withTenantContext(...)` direto.
  - Story 1.9 (logger) deve incluir `condominio_id` em todos os logs
    estruturados pra rastreabilidade.

  CodeRabbit não foi executado (CLI WSL-only, ambiente macOS). Validação
  manual + suite integration completa foi suficiente pra story crítica.
