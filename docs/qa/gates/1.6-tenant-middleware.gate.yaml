branch: feature/1.6-tenant-middleware

summary: |
  Story crítica de segurança em runtime. Conecta auth Clerk (1.5) ao RLS
  Postgres (1.4) via middleware aplicacional com `withTenantContext`.

  Defesa em profundidade agora funciona em produção, não só nos testes.
  Quando rota usa `withTenant(callback)`, queries Prisma dentro são
  AUTOMATICAMENTE filtradas pelo condominio_id do user logado.

  Decisão arquitetural T5 (Opção B — withTenant callback) foi correta:
  $extends do Prisma exigiria hacks pra wrappar transação. Opção B é
  explícita e funciona com API natural de $transaction.

  Workarounds bem feitos:
  - SET LOCAL não aceita placeholder Postgres → $executeRawUnsafe + UUID regex
  - Transação forçada (sem ela SET LOCAL é noop, vazaria dados)
  - super_admin limpa current_condominio (e vice-versa) — evita vazamento
    de pool de conexão

issues:
  - severity: low
    category: design
    description: |
      `withTenantContext` aceita `TenantContext` como argumento,
      facilita testar mas em route handlers normais (que usam `withTenant`)
      o context vem de `getTenantContext` cached. Não há proteção contra
      passagem maliciosa de context inventado para `withTenantContext`.
    impact: |
      Função é usada apenas internamente (não exposta a request). Caller
      malicioso já teria comprometido o servidor.
    recommendation: |
      Aceitável. Padrão "trust internal API" comum em Next.js server code.
      Documentar em comentário JSDoc que `withTenantContext` é INTERNAL.
    blocking: false

  - severity: low
    category: ergonomia
    description: |
      Call-sites usando `withTenant(async (tx) => tx.unidade.findMany())`
      são levemente mais verbosos que se fosse $extends transparente
      (`db.unidade.findMany()`).
    impact: |
      Trade-off intencional documentado em Dev Notes (T5). Aceitável pra MVP.
    recommendation: |
      Quando virar dor real (10+ stories de feature usando withTenant),
      considerar refatorar pra Prisma extension. Pós-MVP.
    blocking: false

  - severity: medium
    category: security
    description: |
      Mesmas 2 vulns moderate em postcss (recorrente desde 1.1).
    impact: build-time only.
    recommendation: já documentado.
    blocking: false

