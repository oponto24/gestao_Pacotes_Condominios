name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + TypeCheck + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: TypeCheck
        run: npm run typecheck

      - name: Unit tests
        run: npx vitest run --reporter=verbose --exclude='tests/integration/**'
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          CLERK_SECRET_KEY: sk_test_fake
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_fake
          META_DISABLED: "true"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gestao_pacotes
          POSTGRES_USER: app
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://app:ci_password@localhost:5432/gestao_pacotes

      - name: Apply RLS policies
        run: |
          psql postgresql://app:ci_password@localhost:5432/gestao_pacotes \
            -f prisma/migrations/20260506200212_initial_schema/rls_policies.sql

      - name: Set passwords for runtime roles
        run: |
          psql postgresql://app:ci_password@localhost:5432/gestao_pacotes \
            -c "ALTER ROLE app_runtime WITH PASSWORD 'ci_runtime_pw';" \
            -c "ALTER ROLE webhook_worker WITH PASSWORD 'ci_webhook_pw';"

      - name: Integration tests
        run: npx vitest run tests/integration/ --exclude='**/health.test.ts'
        env:
          DATABASE_URL: postgresql://app:ci_password@localhost:5432/gestao_pacotes
          DATABASE_RUNTIME_URL: postgresql://app_runtime:ci_runtime_pw@localhost:5432/gestao_pacotes
          NODE_ENV: test
          CLERK_SECRET_KEY: sk_test_fake
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_fake
          META_DISABLED: "true"

  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [quality, integration]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: |
          docker build \
            -f infra/docker/Dockerfile \
            --target production \
            -t gestao-pacotes:${{ github.sha }} \
            .

      - name: Build worker image
        run: |
          docker build \
            -f infra/docker/Dockerfile \
            --target worker \
            -t gestao-pacotes-worker:${{ github.sha }} \
            .
