name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - name: Unit tests
        run: npx vitest run
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          CLERK_SECRET_KEY: sk_test_fake
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_fake
          META_DISABLED: "true"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/gestao-pacotes
            git pull origin main
            COMPOSE="docker compose -f infra/docker/docker-compose.prod.yml --env-file .env.prod"
            $COMPOSE build --pull
            $COMPOSE up -d --build
            $COMPOSE run --rm --entrypoint "" worker sh -c 'cd /app && ./node_modules/.bin/prisma migrate deploy'
            echo "Deploy concluido em $(date)"
            $COMPOSE ps
